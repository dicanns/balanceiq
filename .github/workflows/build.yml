name: Build Installers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npx vite build

      - name: Build macOS arm64 installer
        run: npx electron-builder --mac --arch arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: balanceiq-mac-arm64
          path: release/*.dmg
          retention-days: 30

  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npx vite build

      - name: Build macOS x64 installer
        run: npx electron-builder --mac --arch x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: balanceiq-mac-x64
          path: release/*.dmg
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npx vite build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: balanceiq-win
          path: release/*.exe
          retention-days: 30
