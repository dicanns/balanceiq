name: Build Installers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps --arch arm64

      - name: Build Vite
        run: npx vite build

      - name: Build macOS Apple Silicon installer
        run: npx electron-builder --mac --arch arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: balanceiq-mac-apple-silicon
          path: release/*.dmg
          retention-days: 30

  build-mac-x64:
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps --arch x64

      - name: Build Vite
        run: npx vite build

      - name: Build macOS Intel installer
        run: npx electron-builder --mac --arch x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: balanceiq-mac-intel
          path: release/*.dmg
          retention-days: 30

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npx vite build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: balanceiq-win
          path: release/*.exe
          retention-days: 30
